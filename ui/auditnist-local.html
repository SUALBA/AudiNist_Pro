      }

<body class="bg-cyberbg text-gray-100 font-mono min-h-screen flex flex-col">

  <!-- Header -->
  <header class="container mx-auto p-4 flex justify-between items-center flex-wrap gap-3">
    <h1 class="text-3xl text-cyberaccent">🔐 AuditNIST Local</h1>
    <div class="flex gap-3 items-center flex-wrap">
      <select id="lang-select" onchange="setLanguage(this.value)"
              class="px-2 py-1 bg-gray-700 text-gray-100 rounded text-sm border border-gray-600">
        <option value="es">🌐 ES — Español</option>
        <option value="en">EN — English</option>
        <option value="fr">FR — Français</option>
        <option value="de">DE — Deutsch</option>
        <option value="pt">PT — Português</option>
        <option value="ar">AR — العربية</option>
        <option value="zh">ZH — 中文</option>
      </select>
      <button onclick="clearData()"
              class="px-3 py-1 bg-cyberevil text-black rounded hover:bg-red-600"
              data-i18n="clear_data">Limpiar datos</button>
    </div>
  </header>
<label class="text-sm text-gray-300 mr-2">Framework:</label>
<select id="framework-select"
        class="bg-cyberpanel text-white border border-cyberaccent px-3 py-1 rounded">
  <option value="nist-csf">NIST CSF 2.0</option>
  <option value="iso27001">ISO 27001</option>
  <option value="cis">CIS Controls v8</option>
  <option value="cobit">COBIT 2019</option>
</select>


  <!-- Suggest Controls -->
  <section class="container mx-auto mt-4 bg-cyberpanel p-4 rounded-lg shadow-lg">
    <div class="grid md:grid-cols-3 gap-4 items-end">
      <div>
        <label class="block font-bold text-cyberaccent" data-i18n="nist_function_label">Función NIST</label>
        <select id="nist-function" class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100">
          <option>Identify</option>
          <option>Protect</option>
          <option>Detect</option>
          <option>Respond</option>
          <option>Recover</option>
        </select>
      </div>
      <div>
        <button id="suggest-controls" onclick="suggestControls()"
                class="px-4 py-2 bg-cyberok text-black rounded hover:bg-green-400"
                data-i18n="suggest_btn">🔍 Sugerir controles</button>
      </div>
      <div>
        <span id="suggest-status" class="text-sm text-cyberwarn"></span>
      </div>
    </div>
    <div id="suggested-controls" class="mt-4 space-y-2"></div>
  </section>

  <!-- Main Form -->
  <main class="container mx-auto flex-1 mt-6 bg-cyberpanel p-6 rounded-lg shadow-lg">
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block font-bold text-cyberaccent" data-i18n="audited_company">Empresa auditada</label>
        <input id="empresa_auditada" type="text" data-i18n-placeholder="audited_company_ph"
               placeholder="Nombre de la empresa" class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent" data-i18n="auditing_company">Empresa auditora</label>
        <input id="empresa_auditora" type="text" data-i18n-placeholder="auditing_company_ph"
               placeholder="Tu consultora o SOC" class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent" data-i18n="auditor_label">Auditor responsable</label>
        <input id="auditor" type="text" data-i18n-placeholder="auditor_ph"
               placeholder="Nombre y rol" class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent" data-i18n="scope_label">Alcance de la auditoría</label>
        <input id="alcance" type="text" data-i18n-placeholder="scope_ph"
               placeholder="Sistemas, red, aplicaciones, etc." class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent" data-i18n="report_id_label">ID del informe</label>
        <input id="id_informe" type="text" data-i18n-placeholder="report_id_ph"
               placeholder="Ej: INF-2025-001" class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
      <div>
        <label class="block font-bold text-cyberaccent" data-i18n="audit_date_label">Fecha de auditoría</label>
        <input id="fecha" type="date" class="w-full mt-1 p-2 rounded bg-gray-700 text-gray-100"/>
      </div>
    </div>

    <div id="controls" class="mt-6 space-y-4"></div>

    <div class="mt-6 flex flex-wrap gap-4">
      <button onclick="addControl()"
              class="px-4 py-2 bg-cyberaccent text-black rounded hover:bg-blue-300"
              data-i18n="add_control_btn">+ Añadir Control</button>
      <button onclick="generatePDF()"
              class="px-4 py-2 bg-cyberok text-black rounded hover:bg-green-400"
              data-i18n="generate_pdf_btn">📄 Generar Informe PDF</button>
      <button onclick="exportToTXT()"
              class="px-4 py-2 bg-cyberaccent text-black rounded hover:bg-indigo-400"
              data-i18n="export_txt_btn">📄 Exportar como .txt</button>
    </div>

    <!-- Summary -->
    <div class="mt-8 grid md:grid-cols-2 gap-4">
      <div class="p-4 bg-cyberbg border-2 border-cyberaccent rounded text-center">
        <div id="countTotal" class="text-xl font-bold">Controles: 0</div>
      </div>
      <div class="p-4 bg-cyberbg border-2 border-cyberok rounded text-center">
        <div id="countOK" class="text-xl font-bold">Cumplidos ✅: 0</div>
      </div>
      <div class="p-4 bg-cyberbg border-2 border-cyberwarn rounded text-center">
        <div id="countFail" class="text-xl font-bold">No cumplidos ❌: 0</div>
      </div>
      <div class="p-4 bg-cyberbg border-2 border-cyberevil rounded text-center">
        <div id="countRisk" class="text-xl font-bold">Riesgos ALTO ⚠️: 0</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="mt-8 grid md:grid-cols-2 gap-8">
      <div class="bg-gray-800 p-4 rounded border border-gray-700">
        <h2 class="text-cyberaccent mb-2 text-center" data-i18n="chart_compliance">Cumplimiento</h2>
        <canvas id="chartCompliance"></canvas>
      </div>
      <div class="bg-gray-800 p-4 rounded border border-gray-700">
        <h2 class="text-cyberaccent mb-2 text-center" data-i18n="chart_risk">Niveles de Riesgo</h2>
        <canvas id="chartRisk"></canvas>
      </div>
    </div>
  </main>

  <footer class="container mx-auto p-4 text-center text-gray-500">
  © 2025 AuditNIST Local — sualba.dev. All rights reserved.
  </footer>

              data-i18n="view_saved_btn">📋 Ver Informes Guardados</button>
      <button onclick="exportToTXT()"

              data-i18n="export_txt_btn">📄 Exportar como .txt</button>
    </div>
    <div id="saved-reports" class="mt-4 space-y-2"></div>

if (frameworkSelect) {
  frameworkSelect.addEventListener("change", (e) => {
    auditEngine.setFramework(e.target.value);
    updateFrameworkUI();
    localStorage.setItem('auditnist_framework', e.target.value);
  });
}


    // ── AI CONFIGURATION LAYER ─────────────────────────
    const AI_CONFIG = {
      provider: 'local',   // 'local' | 'openai' (futuro)
      model: 'qwen2.5:3b',    // modelo activo (no cambia nada aún)
      temperature: 0.2,
      maxTokens: 800
    };
    // ── AI ROUTER ───────────────────────────────────────
async function generateAI(prompt) {

  const currentLang = localStorage.getItem('auditnist_lang') || 'es';

  const languageMap = {
    es: "Spanish",
    en: "English",
    fr: "French",
    de: "German",
    pt: "Portuguese",
    ar: "Arabic",
    zh: "Chinese"
  };

  const languageInstruction = `Respond in ${languageMap[currentLang]}.`;

  const finalPrompt = `
${languageInstruction}

${prompt}
`;

  if (AI_CONFIG.provider === 'local') {
    return callLocalModel(finalPrompt);
  }

  throw new Error('Invalid AI provider');
}

    // ── i18n helpers ─────────────────────────────────────────────────────────
    let currentLang = 'es';
    function T(key) { return (TRANSLATIONS[currentLang] || TRANSLATIONS.es)[key] || TRANSLATIONS.es[key] || key; }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('auditnist_lang', lang);
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

      // Static elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = T(el.getAttribute('data-i18n'));
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = T(el.getAttribute('data-i18n-placeholder'));
      });

      // Existing control blocks
      document.querySelectorAll('.control').forEach(blk => {
        // Labels inside block
        blk.querySelectorAll('[data-i18n]').forEach(el => {
          el.textContent = T(el.getAttribute('data-i18n'));
        });

        // Problem dropdown (preserve selection)
        const probSel = blk.querySelector('.problem');
        const probVal = probSel.value;
        probSel.innerHTML = `<option value="">${T('select_placeholder')}</option>` +
          [...Array(11).keys()].map(i => `<option value="${i}">${T('prob_' + i)}</option>`).join('');
        probSel.value = probVal;
        blk.querySelector('.problem-other').placeholder = T('problem_other_ph');

        // Solution dropdown (preserve selection)
        const solSel = blk.querySelector('.solution');
        const solVal = solSel.value;
        solSel.innerHTML = `<option value="">${T('select_placeholder')}</option>` +
          [...Array(11).keys()].map(i => `<option value="${i}">${T('sol_' + i)}</option>`).join('');
        solSel.value = solVal;
        blk.querySelector('.solution-other').placeholder = T('solution_other_ph');

        // Compliance dropdown (preserve selection, neutral values)
        const cumpleSel = blk.querySelector('.cumple');
        const cumpleVal = cumpleSel.value;
        cumpleSel.innerHTML = `<option value="">--</option>
          <option value="yes">${T('yes')}</option>
          <option value="no">${T('no')}</option>
          <option value="partial">${T('partial')}</option>`;
        cumpleSel.value = cumpleVal;

        // Risk dropdown (preserve selection, neutral values)
        const riesgoSel = blk.querySelector('.riesgo');
        const riesgoVal = riesgoSel.value;
        riesgoSel.innerHTML = `<option value="">--</option>
          <option value="high">${T('high')}</option>
          <option value="medium">${T('medium')}</option>
          <option value="low">${T('low')}</option>`;
        riesgoSel.value = riesgoVal;

        blk.querySelector('.evidencia').placeholder = T('evidence_ph');
      });

      // Chart labels
      if (chartComp) { chartComp.data.labels = [T('yes'), T('no'), T('partial')]; chartComp.update(); }
      if (chartRisk) { chartRisk.data.labels = [T('high'), T('medium'), T('low')]; chartRisk.update(); }

      // Language selector sync
      const ls = document.getElementById('lang-select');
      if (ls) ls.value = lang;

      updateSummary();
    }



        // ── LOCAL MODEL CALL ────────────────────────────────
    async function callLocalModel(prompt) {
      try {
        const response = await fetch('http://localhost:11434/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: AI_CONFIG.model,
            prompt: prompt,
            stream: false
          })
        });

        if (!response.ok) {
          throw new Error('Ollama server error');
        }

        const data = await response.json();
        return (data.response || '').trim();

      } catch (error) {
        alert(T('err_ollama') + error.message);
        throw error;
      }
    }

   async function suggestControls() {

  const btn = document.getElementById('suggest-controls');
  btn.disabled = true;
  document.getElementById('suggest-status').textContent = T('generating');

  try {

    const adapter = auditEngine.getAdapter();
    const domain = document.getElementById('nist-function').value;

    // 🔥 Ahora usamos el adapter, no la IA
    const controls = adapter.getControlsByDomain(domain);

    document.getElementById('suggested-controls').innerHTML =
      controls.map(c =>
        `<button onclick="addSuggestedControl('${c.code} – ${c.name}')"
         class="px-3 py-1 bg-gray-600 text-white rounded">
         ${c.code}
         </button>`
      ).join('');

  } catch (e) {
    alert(T('err_suggestions') + e.message);
  } finally {
    document.getElementById('suggest-status').textContent = '';
    btn.disabled = false;
  }
}
    function addSuggestedControl(text) {
      addControl();
      const ctrls = document.querySelectorAll('.ctrl');
      if (ctrls.length > 0) { ctrls[ctrls.length - 1].value = text; updateAll(); }
    }

    async function autoFillEvidence(btn) {
      const textarea = btn.nextElementSibling;
      const notes = textarea.value.trim();
      if (!notes) { alert(T('write_notes_alert')); return; }
      btn.disabled = true;
      try {
        const prompt = `
          Write a concise audit evidence paragraph based strictly on the following notes:

          "${notes}"

          Requirements:
          - Use professional audit language.
          - Be factual and objective.
          - Do not mention NIST unless explicitly referenced.
          - Focus on observed facts and business impact.
          - Maximum 120 words.
          `;
       textarea.value = await generateAI(prompt);
        updateAll();
      } catch (e) {
        alert(T('err_evidence') + e.message);
      } finally {
        btn.disabled = false;

          </div>
          <div>
            <label class="font-bold text-cyberaccent" data-i18n="risk_label">${T('risk_label')}</label>
            <select class="riesgo mt-1 w-full bg-gray-700 text-gray-100 p-2 rounded" onchange="updateAll()">
              <option value="">--</option>
              <option value="high">${T('high')}</option>
              <option value="medium">${T('medium')}</option>
              <option value="low">${T('low')}</option>
            </select>
          </div>
        </div>
        <label class="font-bold text-cyberaccent mt-4" data-i18n="evidence_label">${T('evidence_label')}</label>
        <button onclick="autoFillEvidence(this)"
                class="mt-1 mb-2 px-2 py-1 bg-cyberwarn text-black rounded"
                data-i18n="ai_evidence_btn">${T('ai_evidence_btn')}</button>
        <textarea class="evidencia mt-1 w-full p-2 rounded bg-gray-700 text-gray-100"
                  rows="3" placeholder="${T('evidence_ph')}"></textarea>
      `;
      document.getElementById('controls').appendChild(wrapper);
      updateAll();
    }

    function toggleOther(sel) {
      sel.nextElementSibling.classList.toggle('hidden', sel.value !== '10');
      updateAll();
    }

    // ── Summary & charts update ───────────────────────────────────────────────
  function updateSummary() {

    const controls = [...document.querySelectorAll('.control')].map(ctrl => {
      return {
        compliance: ctrl.querySelector('.cumple')?.value || ''
      };
    });

    auditEngine.loadControls(controls);

  const summary = auditEngine.getSummary();

    document.getElementById('countTotal').textContent =
      `${T('total_controls')}: ${summary.total}`;

    document.getElementById('countOK').textContent =
      `${T('compliant')}: ${summary.compliant}`;

    document.getElementById('countFail').textContent =
      `${T('non_compliant')}: ${summary.nonCompliant}`;

    document.getElementById('countRisk').textContent =
      `${T('high_risks')}: ${summary.high}`;
  } 

    function updateCharts() {
      if (!chartComp || !chartRisk) return;
      const ok   = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'yes').length;
      const no   = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'no').length;
      const pa   = [...document.querySelectorAll('.cumple')].filter(c => c.value === 'partial').length;
      chartComp.data.datasets[0].data = [ok, no, pa]; chartComp.update();
      const alto = [...document.querySelectorAll('.riesgo')].filter(r => r.value === 'high').length;
      const med  = [...document.querySelectorAll('.riesgo')].filter(r => r.value === 'medium').length;
      const baj  = [...document.querySelectorAll('.riesgo')].filter(r => r.value === 'low').length;
      chartRisk.data.datasets[0].data = [alto, med, baj]; chartRisk.update();
    }

    function updateAll() { updateSummary(); updateCharts(); }

    function clearData() {
      ['empresa_auditada','empresa_auditora','auditor','alcance','id_informe','fecha']
        .forEach(id => document.getElementById(id).value = '');
      const ctrls = document.getElementById('controls');
      while (ctrls.firstChild) ctrls.removeChild(ctrls.firstChild);
      updateAll(); addControl();
    }

    // ── Save / Load ───────────────────────────────────────────────────────────
    function saveProgress() {
      const data = {
        empresa:   document.getElementById('empresa_auditada').value,
        auditora:  document.getElementById('empresa_auditora').value,
        auditor:   document.getElementById('auditor').value,
        alcance:   document.getElementById('alcance').value,
        id:        document.getElementById('id_informe').value || 'sinID',
        fecha:     document.getElementById('fecha').value || new Date().toLocaleDateString(),
        framework: auditEngine.frameworkKey,
        controls:  []
      };
      document.querySelectorAll('.control').forEach(blk => {
        data.controls.push({
          problem:      blk.querySelector('.problem').value,
          problemOther: blk.querySelector('.problem-other').value,
          solution:     blk.querySelector('.solution').value,
          solutionOther:blk.querySelector('.solution-other').value,
          ctrl:         blk.querySelector('.ctrl').value,
          cumple:       blk.querySelector('.cumple').value,
          riesgo:       blk.querySelector('.riesgo').value,
          evidencia:    blk.querySelector('.evidencia').value
        });
      });
      localStorage.setItem(`auditnist_${data.id}`, JSON.stringify(data));
      alert(T('saved_ok'));
    }

    function loadProgress(id = 'ultimo') {
      const key = id === 'ultimo' ? getLatestReportKey() : `auditnist_${id}`;
      const saved = localStorage.getItem(key);
      if (!saved) { alert(T('no_saved_reports')); return; }
      const data = JSON.parse(saved);
      document.getElementById('empresa_auditada').value = data.empresa;
      document.getElementById('empresa_auditora').value = data.auditora;
      document.getElementById('auditor').value  = data.auditor;
      document.getElementById('alcance').value  = data.alcance;
      document.getElementById('id_informe').value = data.id;
      document.getElementById('fecha').value    = data.fecha;
      const ctrlsContainer = document.getElementById('controls');
      while (ctrlsContainer.firstChild) ctrlsContainer.removeChild(ctrlsContainer.firstChild);
      data.controls.forEach(c => {
        addControl();
        const wrapper = document.querySelectorAll('.control')[document.querySelectorAll('.control').length - 1];
        wrapper.querySelector('.problem').value = c.problem;
        wrapper.querySelector('.problem-other').value = c.problemOther;
        wrapper.querySelector('.problem-other').classList.toggle('hidden', c.problem !== '10');
        wrapper.querySelector('.solution').value = c.solution;
        wrapper.querySelector('.solution-other').value = c.solutionOther;
        wrapper.querySelector('.solution-other').classList.toggle('hidden', c.solution !== '10');
        wrapper.querySelector('.ctrl').value     = c.ctrl;
        wrapper.querySelector('.cumple').value   = c.cumple;
        wrapper.querySelector('.riesgo').value   = c.riesgo;
        wrapper.querySelector('.evidencia').value = c.evidencia;
      });
      updateAll();
      if (data.framework) {
        auditEngine.setFramework(data.framework);
        if (frameworkSelect) frameworkSelect.value = data.framework;
        updateFrameworkUI();
      }
    }

    function getLatestReportKey() {
      const keys = Object.keys(localStorage).filter(k => k.startsWith('auditnist_') && k !== 'auditnist_lang' && k !== 'auditnist_framework');
      return keys.sort((a,b) => b.localeCompare(a))[0] || null;
    }

    function listSavedReports() {
      const container = document.getElementById('saved-reports');
      const keys = Object.keys(localStorage)
        .filter(k => k.startsWith('auditnist_') && k !== 'auditnist_lang' && k !== 'auditnist_framework')
        .map(k => k.replace('auditnist_',''));
      if (keys.length === 0) { container.innerHTML = `<em>${T('no_reports_yet')}</em>`; return; }
      container.innerHTML = keys.map(id =>
        `<button onclick="loadProgress('${id}')"
                 class="block px-3 py-1 bg-gray-600 text-white mb-2 rounded">${id}</button>`).join('');
    }

    // ── PDF ───────────────────────────────────────────────────────────────────
    function generatePDF() {
      try {
        const doc = new jsPDF({ unit: 'pt', format: 'a4' });
        const data = {
          id:      document.getElementById('id_informe').value || 'sinID',
          empresa: document.getElementById('empresa_auditada').value,
          auditora:document.getElementById('empresa_auditora').value,
          auditor: document.getElementById('auditor').value,
          alcance: document.getElementById('alcance').value,
          fecha:   document.getElementById('fecha').value || new Date().toLocaleDateString()
        };
        if (!data.empresa || !data.auditora) { alert(T('need_company_err')); return; }

        const pageWidth = doc.internal.pageSize.getWidth();
        doc.setFillColor(15,23,42); doc.rect(0,0,pageWidth,100,'F');
        doc.setTextColor(56,189,248); doc.setFontSize(18).setFont(undefined,'bold');
        doc.text(T('pdf_title'), 40, 100);
        doc.setFontSize(11).setTextColor(0,0,0).setFont(undefined,'normal');

        const labels = [T('pdf_report_id'), T('pdf_audited_company'), T('pdf_auditing_company'),
                        T('pdf_auditor'), T('pdf_scope'), T('pdf_date'), 'Framework'];
        const vals   = [data.id, data.empresa, data.auditora, data.auditor, data.alcance, data.fecha,
                        auditEngine.getAdapter().getName()];
        labels.forEach((lbl,i) => doc.text(`${lbl}: ${vals[i]}`, 40, 120 + i * 14));

        let y = 120 + 7 * 14 + 20;
        doc.setFont(undefined,'bold').setFontSize(14);
        doc.text(T('pdf_controls_heading'), 40, y); y += 20;
        doc.setFont(undefined,'normal').setFontSize(11);

        document.querySelectorAll('.control').forEach((blk, i) => {
          const pVal = blk.querySelector('.problem').value;
          const p = pVal === '10' ? blk.querySelector('.problem-other').value : (pVal ? T('prob_' + pVal) : '');
          const sVal = blk.querySelector('.solution').value;
          const s = sVal === '10' ? blk.querySelector('.solution-other').value : (sVal ? T('sol_' + sVal) : '');
          const ctrl    = blk.querySelector('.ctrl').value;
          const cumpleV = blk.querySelector('.cumple').value;
          const cumple  = cumpleV ? T(cumpleV) : T('pdf_not_specified');
          const riesgoV = blk.querySelector('.riesgo').value;
          const riesgo  = riesgoV ? T(riesgoV) : T('pdf_not_specified');
          const ev      = blk.querySelector('.evidencia').value || T('pdf_no_evidence');

          if (y > 750) { doc.addPage(); y = 50; }
          doc.setFont(undefined,'bold').setFontSize(12);
          doc.text(`${T('pdf_control')} ${i+1}: ${ctrl}`, 40, y); y += 14;
          doc.setFont(undefined,'normal');
          doc.text(`• ${T('pdf_problem')}: ${p}`, 60, y); y += 12;
          doc.text(`• ${T('pdf_solution')}: ${s}`, 60, y); y += 12;
          doc.text(`• ${T('pdf_complies')}: ${cumple}`, 60, y); y += 12;
          doc.text(`• ${T('pdf_risk')}: ${riesgo}`, 60, y); y += 12;
          doc.text(`• ${T('pdf_evidence')}:`, 60, y); y += 10;
          const lines = doc.splitTextToSize(ev, 480);
          doc.text(lines, 70, y); y += lines.length * 12 + 20;
        });

        doc.save(`Audit_${auditEngine.frameworkKey.toUpperCase()}_${data.id}.pdf`);
      } catch (e) {
        console.error(e); alert(T('pdf_err') + e.message);
      }
    }

    // ── TXT export ────────────────────────────────────────────────────────────
    function exportToTXT() {
      const data = {
        id:      document.getElementById('id_informe').value || 'sinID',
        empresa: document.getElementById('empresa_auditada').value,
        auditora:document.getElementById('empresa_auditora').value,
        auditor: document.getElementById('auditor').value,
        alcance: document.getElementById('alcance').value,
        fecha:   document.getElementById('fecha').value || new Date().toLocaleDateString()
      };
      let txt = `${T('pdf_title')}\n===========================\n\n`;
      txt += `${T('pdf_report_id')}: ${data.id}\n`;
      txt += `${T('pdf_audited_company')}: ${data.empresa}\n`;
      txt += `${T('pdf_auditing_company')}: ${data.auditora}\n`;
      txt += `${T('pdf_auditor')}: ${data.auditor}\n`;
      txt += `${T('pdf_scope')}: ${data.alcance}\n`;
      txt += `${T('pdf_date')}: ${data.fecha}\n`;
      txt += `Framework: ${auditEngine.getAdapter().getName()}\n\n`;
      txt += `${T('txt_controls_heading')}\n`;

      document.querySelectorAll('.control').forEach((blk, i) => {
        const pVal = blk.querySelector('.problem').value;
        const p = pVal === '10' ? blk.querySelector('.problem-other').value : (pVal ? T('prob_' + pVal) : '');
        const sVal = blk.querySelector('.solution').value;
        const s = sVal === '10' ? blk.querySelector('.solution-other').value : (sVal ? T('sol_' + sVal) : '');
        const ctrl    = blk.querySelector('.ctrl').value;
        const cumpleV = blk.querySelector('.cumple').value;
        const riesgoV = blk.querySelector('.riesgo').value;
        const ev      = blk.querySelector('.evidencia').value;
        txt += `\n${T('control_label')}: ${ctrl}\n`;
        txt += `• ${T('pdf_problem')}: ${p}\n`;
        txt += `• ${T('pdf_solution')}: ${s}\n`;
        txt += `• ${T('pdf_complies')}: ${cumpleV ? T(cumpleV) : ''}\n`;
        txt += `• ${T('pdf_risk')}: ${riesgoV ? T(riesgoV) : ''}\n`;
        txt += `• ${T('pdf_evidence')}: ${ev}\n`;
      });

      const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
      saveAs(blob, `Audit_${auditEngine.frameworkKey.toUpperCase()}_${data.id}.txt`);
    }



function updateFrameworkUI() {
  const adapter = auditEngine.getAdapter();
  const categories = adapter.getCategories();

  const categorySelect = document.getElementById("nist-function");
  if (!categorySelect) return;

  categorySelect.innerHTML = "";

  categories.forEach(cat => {
    const opt = document.createElement("option");
    opt.value = cat;
    opt.textContent = cat;
    categorySelect.appendChild(opt);
  });

  // actualizar placeholder de control ID
  const placeholder = adapter.getControlPlaceholder();
  document.querySelectorAll(".ctrl").forEach(input => {
    input.placeholder = placeholder;
  });

  }

  updateFrameworkUI();
    // ── Init ──────────────────────────────────────────────────────────────────
 

window.saveProgress = saveProgress;
window.clearData = clearData;
window.addControl = addControl;
window.updateAll = updateAll;
window.setLanguage = setLanguage;
window.suggestControls = suggestControls;
window.autoFillEvidence = autoFillEvidence;
window.loadProgress = loadProgress;
window.listSavedReports = listSavedReports;
window.exportToTXT = exportToTXT;
window.generatePDF = generatePDF;

document.addEventListener('DOMContentLoaded', () => {
  initCharts();

  const savedLang = localStorage.getItem('auditnist_lang') || 'es';
  setLanguage(savedLang);

  const savedFw = localStorage.getItem('auditnist_framework') || 'nist-csf';
  auditEngine.setFramework(savedFw);
  if (frameworkSelect) frameworkSelect.value = savedFw;
  updateFrameworkUI();

  addControl();
});
  </script>
</body>
